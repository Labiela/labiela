<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contas de Casa</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <style>
    :root{--bg:#f4f5f7;--card:#fff;--text:#1b1b1b;--muted:#666;--primary:#111;--border:#ddd;--accent:#0ea5e9}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .hidden{display:none !important}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .grid{display:grid;grid-template-columns:320px 1fr;gap:16px}
    .login{max-width:420px;margin:80px auto}
    h1,h2,h3,p{margin:0 0 12px}
    label{display:block;font-size:14px;margin:10px 0 6px}
    input,select,textarea,button{width:100%;padding:11px 12px;border-radius:10px;border:1px solid #cfcfcf;font-size:15px;background:#fff}
    textarea{resize:vertical}
    button{cursor:pointer;border:none;background:var(--primary);color:#fff;font-weight:700}
    button.secondary{background:#e8e8e8;color:#111}
    button.link{background:transparent;color:#111;border:1px solid #ccc}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .full{grid-column:1/-1}
    .header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2ff;font-size:12px}
    .muted{color:var(--muted);font-size:13px}
    .msg{margin-top:10px;font-weight:700}
    .list{margin:0;padding-left:18px}
    .item{margin:8px 0;line-height:1.4}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .actions button{width:auto}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="loginOverlay" style="position:fixed;inset:0;background:rgba(247,246,242,.96);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div class="panel" style="width:min(420px,92vw);padding:24px;">
    <div class="section-head"><div><h3 style="margin:0;">Entrar</h3><p style="margin:6px 0 0;">Use sua conta do Supabase.</p></div></div>
    <form id="loginForm" style="display:grid;gap:12px;">
      <div class="field"><label for="loginEmail">E-mail</label><input id="loginEmail" type="email" required></div>
      <div class="field"><label for="loginPassword">Senha</label><input id="loginPassword" type="password" required></div>
      <div class="toolbar"><button class="primary" type="submit">Entrar</button></div>
      <p id="loginMsg" class="muted" style="margin:0;"></p>
    </form>
  </div>
</div>

  <div id="loginView" class="wrap login">
    <div class="card">
      <div class="header">
        <div>
          <h1>Entrar</h1>
          <p class="muted">Use o e-mail e a senha cadastrados no Supabase.</p>
        </div>
        <span class="pill">Acesso privado</span>
      </div>
      <label>E-mail</label>
      <input id="email" type="email" placeholder="seuemail@exemplo.com" />
      <label>Senha</label>
      <input id="password" type="password" placeholder="Sua senha" />
      <div class="actions" style="margin-top:12px">
        <button id="btnLogin">Entrar</button>
      </div>
      <div id="loginMsg" class="msg"></div>
    </div>
  </div>

  <div id="appView" class="wrap hidden">
    <div class="topbar">
      <div>
        <h1>Contas de casa</h1>
        <div class="muted" id="userInfo"></div>
      </div>
      <div class="actions">
        <button id="btnLogout" class="secondary">Sair</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Adicionar conta</h2>
        <label>Descrição</label>
        <input id="descricao" placeholder="Ex: Mercado" />
        <div class="row">
          <div>
            <label>Valor</label>
            <input id="valor" type="number" step="0.01" placeholder="0,00" />
          </div>
          <div>
            <label>Data</label>
            <input id="data" type="date" />
          </div>
          <div>
            <label>Mês</label>
            <input id="mes" type="month" />
          </div>
          <div>
            <label>Quem pagou</label>
            <input id="pagou" placeholder="Ex: Eu" />
          </div>
          <div>
            <label>Categoria</label>
            <input id="categoria" placeholder="Ex: Casa" />
          </div>
          <div class="full">
            <label>Observação</label>
            <textarea id="obs" rows="3" placeholder="Detalhes"></textarea>
          </div>
        </div>
        <div class="actions" style="margin-top:12px">
          <button id="btnSave">Salvar conta</button>
          <button id="btnClear" class="link">Limpar</button>
        </div>
        <div id="saveMsg" class="msg"></div>
      </div>

      <div class="card">
        <div class="header">
          <h2>Contas salvas</h2>
          <span class="pill" id="countPill">0 itens</span>
        </div>
        <div class="muted" id="status">Carregando...</div>
        <ul id="lista" class="list"></ul>
      </div>
    </div>
  </div>

  <script>
const SUPABASE_URL = 'https://kzwzbeewquwkfafglyfu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YvoiJbW9loh7ocUq92V2Sg_0YX2yamp';
const supabase = window.supabase?.createClient ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
const s = id => document.getElementById(id);
const loginForm = s('loginForm');
const loginMsg = s('loginMsg');
const loginOverlay = s('loginOverlay');
async function login(e){
  e.preventDefault();
  try{
    if(!supabase){ loginMsg.textContent='Supabase não carregou.'; return; }
    const email = s('loginEmail').value.trim();
    const password = s('loginPassword').value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if(error){ loginMsg.textContent = error.message; return; }
    loginMsg.textContent = 'Login ok';
    loginOverlay.style.display = 'none';
  }catch(err){
    loginMsg.textContent = err.message || String(err);
  }
}
loginForm?.addEventListener('submit', login);
</script>

<!-- SUPABASE SETUP:
1) Create table public.expenses:
   id uuid primary key default gen_random_uuid(),
   user_id uuid not null references auth.users(id) on delete cascade,
   descricao text not null,
   categoria text not null,
   valor numeric not null,
   data date not null,
   tipo text not null,
   pago_por text not null,
   created_at timestamptz not null default now()
2) Enable RLS on public.expenses.
3) Add policies:
   - SELECT: to authenticated using (auth.uid() = user_id)
   - INSERT: to authenticated with check (auth.uid() = user_id)
   - UPDATE: to authenticated using (auth.uid() = user_id)
   - DELETE: to authenticated using (auth.uid() = user_id)
4) Create one user account for you and one for your wife in Auth.
5) Use this file in the browser. -->
</body>
</html>
