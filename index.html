<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Labiela</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <style>
    body{font-family:system-ui,Arial,sans-serif;background:#f6f6f6;margin:0;min-height:100vh;display:grid;place-items:center}
    .box{width:min(420px,92vw);background:#fff;border:1px solid #ddd;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{margin:0 0 8px;font-size:34px}
    p{margin:0 0 16px;color:#666}
    label{display:block;margin:12px 0 6px;font-weight:600}
    input{width:100%;padding:14px;border:1px solid #ccc;border-radius:12px;font-size:16px;box-sizing:border-box}
    button{margin-top:16px;width:100%;padding:14px;border:0;border-radius:12px;background:#111;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
    .msg{margin-top:12px;min-height:22px;color:#b00020}
    .ok{color:#0a7a2f}
    .hidden{display:none}
    .panel{margin-top:18px;padding:16px;border:1px dashed #ddd;border-radius:12px;background:#fafafa}
  </style>
</head>
<body>
  <div class="box">
    <div id="loginView">
      <h1>Entrar</h1>
      <p>Acesso privado</p>
      <form id="loginForm">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="seuemail@exemplo.com" required />
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="Sua senha" required />
        <button type="submit">Entrar</button>
        <div id="msg" class="msg"></div>
      </form>
    </div>

    <div id="appView" class="hidden">
      <h1>Conectado</h1>
      <p id="userInfo"></p>
      <div class="panel">O login funcionou. Aqui depois entra o visual antigo das contas.</div>
      <button id="logoutBtn" type="button">Sair</button>
    </div>
  </div>

<script>
const SUPABASE_URL = 'https://kzwzbeewquwkfafglyfu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YvoiJbW9loh7ocUq92V2Sg_0YX2yamp';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const loginView = document.getElementById('loginView');
const appView = document.getElementById('appView');
const msg = document.getElementById('msg');
const userInfo = document.getElementById('userInfo');

async function showSession(){
  const { data } = await supabase.auth.getSession();
  const user = data.session?.user;
  if(user){
    loginView.classList.add('hidden');
    appView.classList.remove('hidden');
    userInfo.textContent = user.email;
  }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = 'Entrando...';
  msg.className = 'msg';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if(error){
    msg.textContent = error.message;
    return;
  }
  msg.textContent = 'Login ok';
  msg.className = 'msg ok';
  loginView.classList.add('hidden');
  appView.classList.remove('hidden');
  userInfo.textContent = data.user?.email || email;
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  appView.classList.add('hidden');
  loginView.classList.remove('hidden');
  msg.textContent = '';
});

showSession();
</script>
</body>
</html>
